<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - 卡卡部署</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 20px;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2em;
        }
        .score {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #4ecca3;
        }
        #gameCanvas {
            border: 3px solid #4ecca3;
            border-radius: 10px;
            background: #0f0f23;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.3);
        }
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        .btn {
            padding: 12px 30px;
            font-size: 1.2em;
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(78, 204, 163, 0.5);
        }
        .instructions {
            margin-top: 20px;
            opacity: 0.7;
            font-size: 0.9em;
        }
        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 10px;
        }
        .mobile-btn {
            width: 60px;
            height: 60px;
            font-size: 1.5em;
            background: rgba(78, 204, 163, 0.2);
            border: 2px solid #4ecca3;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            .mobile-controls {
                display: grid;
                grid-template-columns: repeat(3, 60px);
                grid-template-rows: repeat(2, 60px);
                justify-items: center;
                align-items: center;
            }
            .up { grid-column: 2; grid-row: 1; }
            .left { grid-column: 1; grid-row: 2; }
            .down { grid-column: 2; grid-row: 2; }
            .right { grid-column: 3; grid-row: 2; }
            .instructions {
                display: none;
            }
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <div class="score">得分：<span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="controls">
        <button class="btn" onclick="startGame()">开始游戏</button>
        <button class="btn" onclick="resetGame()">重置</button>
    </div>
    
    <div class="mobile-controls">
        <button class="mobile-btn up" onclick="changeDirection('up')">⬆️</button>
        <button class="mobile-btn left" onclick="changeDirection('left')">⬅️</button>
        <button class="mobile-btn down" onclick="changeDirection('down')">⬇️</button>
        <button class="mobile-btn right" onclick="changeDirection('right')">➡️</button>
    </div>
    
    <div class="instructions">
        使用方向键 ↑ ↓ ← → 控制移动
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let gameLoop = null;
        let gameSpeed = 150;
        
        function initGame() {
            snake = [
                {x: 5, y: 10},
                {x: 4, y: 10},
                {x: 3, y: 10}
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            scoreElement.textContent = score;
            placeFood();
        }
        
        function placeFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // 确保食物不会生成在蛇身上
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    placeFood();
                    break;
                }
            }
        }
        
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 画食物
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize/2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 画蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    0,
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    gridSize/2
                );
                
                if (index === 0) {
                    gradient.addColorStop(0, '#5eead4');
                    gradient.addColorStop(1, '#4ecca3');
                } else {
                    gradient.addColorStop(0, '#4ecca3');
                    gradient.addColorStop(1, '#3db892');
                }
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();
                
                // 画眼睛（只有蛇头）
                if (index === 0) {
                    ctx.fillStyle = '#1a1a2e';
                    const eyeSize = 3;
                    const eyeOffset = 5;
                    
                    if (direction === 'right' || direction === 'left') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + eyeOffset, segment.y * gridSize + 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + eyeOffset, segment.y * gridSize + gridSize - 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 6, segment.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 6, segment.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });
        }
        
        function update() {
            direction = nextDirection;
            
            const head = {x: snake[0].x, y: snake[0].y};
            
            switch(direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            // 检查撞墙
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // 检查撞自己
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // 检查吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                placeFood();
                // 加速
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }
        
        function gameStep() {
            update();
            draw();
        }
        
        function startGame() {
            if (gameLoop) return;
            initGame();
            gameSpeed = 150;
            gameLoop = setInterval(gameStep, gameSpeed);
        }
        
        function resetGame() {
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
            initGame();
            draw();
        }
        
        function gameOver() {
            clearInterval(gameLoop);
            gameLoop = null;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 40px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束!', canvas.width/2, canvas.height/2 - 20);
            
            ctx.fillStyle = 'white';
            ctx.font = '24px sans-serif';
            ctx.fillText('得分：' + score, canvas.width/2, canvas.height/2 + 20);
        }
        
        function changeDirection(dir) {
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            
            if (opposites[dir] !== direction) {
                nextDirection = dir;
            }
        }
        
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': changeDirection('up'); break;
                case 'ArrowDown': changeDirection('down'); break;
                case 'ArrowLeft': changeDirection('left'); break;
                case 'ArrowRight': changeDirection('right'); break;
            }
        });
        
        // 初始化
        initGame();
        draw();
    </script>
</body>
</html>
